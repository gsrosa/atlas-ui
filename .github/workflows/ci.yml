name: CI

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build, Test & Tag Release
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.merged == true }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - id: tag_release
        name: Create release tag when version changed
        run: |
          echo "has_version_change=false" >> "$GITHUB_OUTPUT"

          if git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.merge_commit_sha }}" -- package.json; then
            echo "No package.json version change. Skipping tag."
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          TAG="nexploring-ui-v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "has_version_change=true" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Skipping."
            exit 0
          fi

          git tag "${TAG}" "${{ github.event.pull_request.merge_commit_sha }}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: ${{ steps.tag_release.outputs.has_version_change == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag_release.outputs.tag }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping."
            exit 0
          fi

          gh release create "${TAG}" \
            --target "${{ github.event.pull_request.merge_commit_sha }}" \
            --title "${TAG}" \
            --generate-notes
