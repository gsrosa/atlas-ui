name: CI

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build, Test & Tag Release
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.merged == true }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create release tag when version changed
        run: |
          if git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.merge_commit_sha }}" -- package.json; then
            echo "No package.json version change. Skipping tag."
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          TAG="nexploring-ui-v${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Skipping."
            exit 0
          fi

          git tag "${TAG}" "${{ github.event.pull_request.merge_commit_sha }}"
          git push origin "${TAG}"
